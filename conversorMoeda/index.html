<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Conversor de Moedas</title>
</head>
<body>
    <div class="container">
        <h1>Conversor de Moedas</h1>

        <form action="" class="converter-form" id="converterForm">
            <div class="currency-row">
                <div class="currency-input">
                    <label for="amount">valor </label>
                    <input type="number" id="amount" name="amount" step="0.1" placeholder="Digite seu valor" min="0" required>
                </div>

                <div class="currency-select">
                    <label for="fromCurrency">De</label>
                    <select id="fromCurrency" name="fromCurrency" required>
                        <option value="BRL" selected>Real Brasileiro</option>
                        <option value="USD">Dólar Americano</option>
                        <option value="EUR">Euro</option>
                        <option value="GBP">GBP - Libra</option>
                        <option value="JPY">JPY - Iene</option>
                        <option value="CAD">CAD - Dólar Canadense</option>
                        <option value="AUD">AUD - Dólar Australiano</option>
                        <option value="CHF">CHF - Franco Suíço</option>
                        <option value="CNY">CNY - Yuan Chinês</option>
                        <option value="ARS">ARS - Peso Argentino</option>
                    </select>
                </div>


            </div>
            <div class="currency-row">
                <div class="currency-input">
                    <label for="convertamount">Resultado</label>
                    <input type="text" id="convertamount" name="convertamount"  placeholder="Valor convertido" readonly>
                </div>

                <div class="currency-select">
                    <label for="toCurrency">Para</label>
                    <select id="toCurrency" name="toCurrency" required>
                        <option value="BRL">Real Brasileiro</option>
                        <option value="USD" selected>Dólar Americano</option>
                        <option value="EUR">Euro</option>
                        <option value="GBP">GBP - Libra</option>
                        <option value="JPY">JPY - Iene</option>
                        <option value="CAD">CAD - Dólar Canadense</option>
                        <option value="AUD">AUD - Dólar Australiano</option>
                        <option value="CHF">CHF - Franco Suíço</option>
                        <option value="CNY">CNY - Yuan Chinês</option>
                        <option value="ARS">ARS - Peso Argentino</option>
                    </select>
                </div>


            </div>
            <button type="submit" class="converter-btn" id="converterBtn">
                💰 Converter Moeda
            </button>
        </form>

            <div class="loading">
                <div class="spinner"></div>
                <p>Buscando cotação...</p>
            </div>

            <div class="result"></div>
            <div class="error"></div>

            <div class="info">
                <p>Taxas atualizadas em tempo real</p>
            </div>

    </div>

</body>
<script src="script.js"></script>
</html>
